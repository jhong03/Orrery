name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm install`, not `npm ci`: Vite 8 / Rolldown's optional native
      # bindings resolve different transitive deps per platform (the
      # @emnapi/* wasm-fallback chain), so a lockfile generated on one OS is
      # never complete for another and `npm ci`'s strict sync check fails on
      # the Linux runner. `npm install` resolves those per-platform while still
      # honoring the lockfile's pins for everything else.
      - run: npm install --no-audit --no-fund

      # Textures aren't committed (see ASSETS.md) — fetch them before building.
      # Cached so we don't re-download ~30 MB unless the manifest changes.
      - name: Cache textures
        uses: actions/cache@v4
        with:
          path: public/textures
          key: textures-${{ hashFiles('scripts/fetch-assets.mjs') }}

      - name: Fetch textures
        run: node scripts/fetch-assets.mjs

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: 'true'

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
